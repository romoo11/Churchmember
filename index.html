<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>교인 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#F5F4EC; --card:#FFFFFF; --ink:#24312A; --muted:#6C7A72;
    --pine:#2F5D50; --pine-deep:#1E3F36; --pine-soft:#E4EDE9;
    --gold:#C29B3C; --gold-soft:#F4EAD2;
    --blue:#3D5A80; --clay:#A8442F; --clay-soft:#F4E2DC;
    --line:#DCD9CC;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Sans KR",-apple-system,"Malgun Gothic",sans-serif;font-size:15.5px;line-height:1.55}
  h1,h2,h3{font-family:"Gowun Batang","Noto Sans KR",serif;letter-spacing:-.01em}
  button{font-family:inherit;font-size:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:inherit;color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:9px 11px;background:#fff;max-width:100%}
  input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--pine);outline-offset:1px}
  textarea{width:100%;resize:vertical}
  .wrap{max-width:1020px;margin:0 auto;padding:0 16px 70px}

  header.top{background:var(--pine-deep);color:#F2EFE4;position:sticky;top:0;z-index:20;
    box-shadow:0 2px 10px rgba(20,40,32,.25)}
  .top-in{max-width:1020px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{font-family:"Gowun Batang",serif;font-weight:700;font-size:19px;display:flex;align-items:center;gap:9px}
  .brand svg{flex:none}
  .brand button{background:none;border:none;color:inherit;font:inherit;padding:0;text-align:left}
  .brand button:hover{text-decoration:underline}
  nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
  nav button{background:none;border:none;color:#CFDDD6;padding:8px 13px;border-radius:8px;font-weight:500}
  nav button:hover{background:rgba(255,255,255,.09);color:#fff}
  nav button.on{background:var(--gold);color:#2A2410;font-weight:700}
  .backup-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
    color:#F2EFE4;padding:6px 12px;border-radius:8px;font-size:13.5px}
  .backup-btn:hover{background:rgba(255,255,255,.2)}

  .hero{position:relative;border-radius:16px;overflow:hidden;margin:20px 0 22px;
    box-shadow:0 8px 28px rgba(30,63,54,.28)}
  .hero svg{display:block;width:100%;height:auto}
  .hero-text{position:absolute;left:0;right:0;bottom:0;padding:18px 26px;
    background:linear-gradient(transparent,rgba(16,30,25,.72));color:#F7F3E6}
  .hero-text h1{margin:0;font-size:clamp(22px,4.2vw,34px)}
  .hero-text p{margin:4px 0 0;font-size:clamp(13px,2.2vw,15.5px);color:#E4DDC4}

  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .n{font-family:"Gowun Batang",serif;font-size:30px;font-weight:700;color:var(--pine)}
  .stat .l{color:var(--muted);font-size:13.5px}
  .stat.gold .n{color:var(--gold)}
  .stat.clay .n{color:var(--clay)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:16px}
  .panel h2{margin:0 0 12px;font-size:19px;color:var(--pine-deep);
    border-bottom:2px solid var(--gold);display:inline-block;padding-bottom:3px}
  .panel h3{margin:18px 0 8px;font-size:16.5px;color:var(--pine-deep)}
  .muted{color:var(--muted)}
  .small{font-size:13.5px}

  .btn{background:var(--pine);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-weight:600}
  .btn:hover{background:var(--pine-deep)}
  .btn.gold{background:var(--gold);color:#2A2410}
  .btn.gold:hover{filter:brightness(.94)}
  .btn.ghost{background:#fff;color:var(--pine);border:1.5px solid var(--pine)}
  .btn.ghost:hover{background:var(--pine-soft)}
  .btn.danger{background:#fff;color:var(--clay);border:1.5px solid var(--clay)}
  .btn.danger:hover{background:var(--clay-soft)}
  .btn.sm{padding:5px 11px;font-size:13.5px;border-radius:7px}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  .field label{font-weight:600;font-size:13.5px;color:var(--pine-deep)}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:0 16px}

  .chip{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12.5px;font-weight:600}
  .chip.pos{background:var(--pine-soft);color:var(--pine-deep)}
  .chip.now{background:var(--gold-soft);color:#7A5E14}
  .chip.past{background:#EEECE3;color:var(--muted)}
  .chip.open{background:var(--clay-soft);color:var(--clay)}
  .chip.ans{background:var(--pine-soft);color:var(--pine)}
  .chip.admin{background:var(--gold-soft);color:#7A5E14}
  .chip.editor{background:var(--pine-soft);color:var(--pine-deep)}
  .chip.pending{background:var(--clay-soft);color:var(--clay)}
  .chip.viewer{background:#E2E9F2;color:#3D5A80}

  .mem-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
  .mem-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;
    text-align:left;transition:box-shadow .15s,border-color .15s}
  .mem-card:hover{border-color:var(--pine);box-shadow:0 3px 12px rgba(47,93,80,.15)}
  .mem-card .nm{font-family:"Gowun Batang",serif;font-size:18px;font-weight:700}
  .mem-card .sub{color:var(--muted);font-size:13px;margin-top:3px}

  table{width:100%;border-collapse:collapse;font-size:14.5px}
  th{text-align:left;color:var(--pine-deep);font-size:13px;border-bottom:2px solid var(--line);padding:6px 8px;white-space:nowrap}
  td{border-bottom:1px solid #EAE8DE;padding:8px;vertical-align:top}
  tr:last-child td{border-bottom:none}
  .tbl-wrap{overflow-x:auto}

  .svc-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .svc-tabs button{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 18px;font-weight:600;color:var(--muted)}
  .svc-tabs button.on{background:var(--pine);border-color:var(--pine);color:#fff}
  .att-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-top:14px}
  .att-item{display:flex;align-items:center;gap:9px;border:1.5px solid var(--line);border-radius:10px;
    padding:9px 12px;background:#fff;font-weight:500;text-align:left}
  .att-item.on{background:var(--pine-soft);border-color:var(--pine);color:var(--pine-deep);font-weight:700}
  .att-item .mark{flex:none;width:22px;height:22px;border-radius:6px;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;background:#fff}
  .att-item.on .mark{background:var(--pine);border-color:var(--pine)}
  .count-badge{font-family:"Gowun Batang",serif;font-size:22px;font-weight:700;color:var(--pine)}

  .empty{padding:28px 10px;text-align:center;color:var(--muted)}
  .back-line{margin:16px 0 10px}
  .divider{border:none;border-top:1px solid var(--line);margin:16px 0}
  .notice{background:var(--gold-soft);border:1px solid #E4D3A2;border-radius:10px;padding:10px 14px;font-size:13.5px;margin-bottom:14px}
  .err-banner{background:var(--clay-soft);border:1px solid #DFB1A2;color:#7C2E1E;
    border-radius:10px;padding:10px 14px;font-size:13.5px;margin:14px 0}

  .modal-back{position:fixed;inset:0;background:rgba(18,30,25,.55);display:flex;
    align-items:center;justify-content:center;z-index:60;padding:16px}
  .modal-back .panel{max-width:440px;width:100%;margin:0}

  .center-box{max-width:430px;margin:60px auto;padding:0 16px}
  .center-box .panel{padding:26px 26px 24px}
  .center-box .logo-line{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:14px;
    font-family:"Gowun Batang",serif;font-weight:700;font-size:21px;color:var(--pine-deep)}
  .center-box input{width:100%}
  .auth-tabs{display:flex;gap:6px;margin-bottom:16px}
  .auth-tabs button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:9px;font-weight:600;color:var(--muted)}
  .auth-tabs button.on{background:var(--pine);border-color:var(--pine);color:#fff}

  @media (max-width:640px){
    .top-in{padding:8px 12px}
    nav{width:100%;overflow-x:auto;flex-wrap:nowrap}
    nav button{white-space:nowrap;padding:7px 11px;font-size:14px}
  }
</style>
</head>

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const pad = n => String(n).padStart(2, "0");
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const nowLocal = () => { const d = new Date(); return `${todayStr()}T${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const WEEKDAYS = ["일","월","화","수","목","금","토"];
const weekdayOf = ds => { const d = new Date(ds + "T00:00:00"); return isNaN(d) ? "" : WEEKDAYS[d.getDay()]; };
const lastWeekday = (dow) => {
  const d = new Date(); const diff = (d.getDay() - dow + 7) % 7;
  d.setDate(d.getDate() - diff);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};
const calcAge = birth => {
  if (!birth) return null;
  const b = new Date(birth + "T00:00:00"); if (isNaN(b)) return null;
  const t = new Date(); let a = t.getFullYear() - b.getFullYear();
  if (t.getMonth() < b.getMonth() || (t.getMonth() === b.getMonth() && t.getDate() < b.getDate())) a--;
  return a;
};
const fmtDT = v => {
  if (!v) return "";
  const [d, t] = v.split("T");
  return t ? `${d} (${weekdayOf(d)}) ${t}` : `${d} (${weekdayOf(d)})`;
};

/* 속회(선교회) 배정: 메모의 선교회 기록 우선, 없으면 성별+출생연도로 자동 */
const SOK_F = [[1948,1],[1954,2],[1958,3],[1962,4],[1968,5],[1973,6],[9999,7]];
const SOK_M = [[1955,1],[1967,2],[9999,3]];
function sokOf(m){
  const memo = m.memo || "";
  let t = memo.match(/([0-9])\s*여선교회/); if(t) return {g:"여", n:Number(t[1])};
  t = memo.match(/([0-9])\s*남선교회/); if(t) return {g:"남", n:Number(t[1])};
  const y = m.birth ? Number(m.birth.slice(0,4)) : 0;
  if(y){
    if(m.gender==="여"){ for(const p of SOK_F){ if(y<=p[0]) return {g:"여", n:p[1]}; } }
    if(m.gender==="남"){ for(const p of SOK_M){ if(y<=p[0]) return {g:"남", n:p[1]}; } }
  }
  return null;
}

/* ───────── 서버 주소 설정 화면 ───────── */
function Setup({onSave, initial}){
  const [url, setUrl] = useState(initial ? initial.url : "");
  const [key, setKey] = useState(initial ? initial.key : "");
  return (
    <div className="center-box">
      <div className="panel">
        <div className="logo-line"><Logo/> 교인 관리 — 처음 설정</div>
        <p className="small muted">이 프로그램의 기록은 교회 전용 Supabase 서버에 저장됩니다.
          Supabase 프로젝트 화면의 <b>Settings → API</b>에서 아래 두 가지를 복사해 붙여넣어 주세요.
          이 설정은 한 번만 하면 이 기기에 기억됩니다.</p>
        <div className="field"><label>Project URL</label>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.supabase.co"/></div>
        <div className="field"><label>anon public 키</label>
          <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJ..."/></div>
        <button className="btn" style={{width:"100%"}} disabled={!url.trim().startsWith("http") || key.trim().length < 20}
          onClick={()=>onSave({url:url.trim().replace(/\/+$/,""), key:key.trim()})}>저장하고 시작</button>
      </div>
    </div>
  );
}

/* ───────── 로그인 / 회원가입 ───────── */
function Auth({sb, resetServer, embedded}){
  const [mode, setMode] = useState("login");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setBusy(true); setMsg("");
    try{
      if(mode === "login"){
        const {error} = await sb.auth.signInWithPassword({email, password:pw});
        if(error) setMsg("로그인 실패 — " + errMsg(error));
      }else{
        const {data, error} = await sb.auth.signUp({email, password:pw, options:{data:{name}}});
        if(error) setMsg("가입 실패 — " + errMsg(error));
        else if(!data.session) setMsg("가입 신청이 접수되었습니다. 이메일 확인이 켜져 있는 서버라면 받은 메일의 확인 버튼을 누른 뒤 로그인해 주세요.");
      }
    }catch(e){ setMsg(errMsg(e)); }
    setBusy(false);
  };

  return (
    <div className="center-box">
      <div className="panel">
        <div className="logo-line"><Logo/> 교인 관리</div>
        <div className="auth-tabs">
          <button className={mode==="login"?"on":""} onClick={()=>{setMode("login");setMsg("");}}>로그인</button>
          <button className={mode==="signup"?"on":""} onClick={()=>{setMode("signup");setMsg("");}}>가입 신청</button>
        </div>
        {mode==="signup" &&
          <div className="field"><label>이름</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="실명을 입력해 주세요"/></div>}
        <div className="field"><label>이메일</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"/></div>
        <div className="field"><label>비밀번호</label>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="6자 이상"
            onKeyDown={e=>{ if(e.key==="Enter") submit(); }}/></div>
        {msg && <div className="err-banner">{msg}</div>}
        <button className="btn" style={{width:"100%"}} disabled={busy || !email || pw.length<6 || (mode==="signup" && !name.trim())}
          onClick={submit}>{busy ? "처리 중…" : (mode==="login" ? "로그인" : "가입 신청")}</button>
        {mode==="signup" &&
          <p className="small muted" style={{marginBottom:0}}>가입 후에는 <b>관리자(담임목사)의 승인</b>이 있어야 교인 기록을 볼 수 있습니다.</p>}
        {!embedded && <React.Fragment>
          <hr className="divider"/>
          <button className="btn sm ghost" onClick={resetServer}>서버 주소 다시 설정</button>
        </React.Fragment>}
      </div>
    </div>
  );
}

/* ───────── 승인 대기 화면 ───────── */
function Pending({profile, logout, refresh}){
  return (
    <div className="center-box">
      <div className="panel" style={{textAlign:"center"}}>
        <div className="logo-line"><Logo/> 교인 관리</div>
        <h2 style={{border:"none"}}>승인을 기다리고 있습니다</h2>
        <p className="small muted">{profile.name || profile.email} 님, 가입 신청이 접수되었습니다.<br/>
          관리자(담임목사)가 승인하면 교인 기록을 보고 수정할 수 있습니다.<br/>
          승인 후 아래 버튼을 눌러 주세요.</p>
        <div className="row" style={{justifyContent:"center"}}>
          <button className="btn" onClick={refresh}>승인 여부 확인</button>
          <button className="btn ghost" onClick={logout}>로그아웃</button>
        </div>
      </div>
    </div>
  );
}

/* ───────── 최상위 ───────── */
function Root(){
  const embedded = !!(EMBED_URL && EMBED_KEY);
  const [cfg, setCfg] = useState(()=>{
    if(EMBED_URL && EMBED_KEY) return {url:EMBED_URL, key:EMBED_KEY};
    try{ const c = JSON.parse(localStorage.getItem(CFG_KEY)); if(c && c.url && c.key) return c; }catch(e){}
    return null;
  });
  const sb = useMemo(()=> cfg ? supabase.createClient(cfg.url, cfg.key) : null, [cfg]);
  const [session, setSession] = useState(undefined); // undefined=확인 중
  const [profile, setProfile] = useState(undefined);

  useEffect(()=>{
    if(!sb){ setSession(null); return; }
    sb.auth.getSession().then(({data})=>setSession(data.session||null));
    const {data:sub} = sb.auth.onAuthStateChange((_e, s)=>setSession(s||null));
    return ()=>sub.subscription.unsubscribe();
  }, [sb]);

  const loadProfile = useCallback(async ()=>{
    if(!sb || !session){ setProfile(undefined); return; }
    const {data, error} = await sb.from("profiles").select("*").eq("id", session.user.id).maybeSingle();
    if(error || !data) setProfile({id:session.user.id, email:session.user.email, name:"", role:"pending", missing:true});
    else setProfile(data);
  }, [sb, session]);

  useEffect(()=>{ if(session) loadProfile(); }, [session, loadProfile]);

  const [lastCfg, setLastCfg] = useState(null);
  const saveCfg = c => { localStorage.setItem(CFG_KEY, JSON.stringify(c)); setCfg(c); };
  const resetServer = () => { setLastCfg(cfg); localStorage.removeItem(CFG_KEY); setCfg(null); };
  const logout = async () => { await sb.auth.signOut(); setProfile(undefined); };

  if(!cfg) return <Setup onSave={saveCfg} initial={lastCfg}/>;
  if(session === undefined) return <div className="center-box"><div className="panel empty">서버에 연결하는 중…</div></div>;
  if(!session) return <Auth sb={sb} resetServer={resetServer} embedded={embedded}/>;
  if(profile === undefined) return <div className="center-box"><div className="panel empty">사용자 정보를 확인하는 중…</div></div>;
  if(profile.role === "pending") return <Pending profile={profile} logout={logout} refresh={loadProfile}/>;
  return <App sb={sb} profile={profile} logout={logout}/>;
}

/* ───────── 앱 본체 ───────── */
function App({sb, profile, logout}){
  const [churchName, setChurchName] = useState("우리교회");
  const [members, setMembers] = useState([]);
  const [att, setAtt] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [err, setErr] = useState("");
  const [view, setView] = useState("home");
  const [memView, setMemView] = useState({mode:"list"});
  const fileRef = useRef(null);
  const isAdmin = profile.role === "admin";
  const canEdit = profile.role === "admin" || profile.role === "editor";

  const fail = e => setErr("저장/불러오기에 실패했습니다 — 원인: " + errMsg(e) + " · 이 문구를 Claude에게 보여주시면 해결할 수 있습니다.");

  const loadAll = useCallback(async ()=>{
    setErr("");
    const [m, a, s] = await Promise.all([
      sb.from("church_members").select("id,data"),
      sb.from("church_attendance").select("date,service,member_ids"),
      sb.from("church_settings").select("key,value"),
    ]);
    if(m.error) return fail(m.error);
    if(a.error) return fail(a.error);
    setMembers((m.data||[]).map(r=>r.data));
    const na = {};
    (a.data||[]).forEach(r=>{ na[r.date] = na[r.date]||{}; na[r.date][r.service] = r.member_ids||[]; });
    setAtt(na);
    if(!s.error){
      const cn = (s.data||[]).find(r=>r.key==="churchName");
      if(cn && cn.value) setChurchName(cn.value);
    }
    setLoaded(true);
  }, [sb]);

  useEffect(()=>{ loadAll(); }, [loadAll]);

  /* ── 서버 쓰기 ── */
  const saveMemberRow = async (m) => {
    setMembers(ms => ms.some(x=>x.id===m.id) ? ms.map(x=>x.id===m.id?m:x) : [...ms, m]);
    const {error} = await sb.from("church_members")
      .upsert({id:m.id, data:m, updated_at:new Date().toISOString(), updated_by:profile.id});
    if(error){ fail(error); loadAll(); }
  };
  const updateMember = (id, fn) => {
    const cur = members.find(x=>x.id===id); if(!cur) return;
    saveMemberRow(fn(cur));
  };
  const removeMember = async (id) => {
    setMembers(ms=>ms.filter(x=>x.id!==id));
    const {error} = await sb.from("church_members").delete().eq("id", id);
    if(error){ fail(error); loadAll(); return; }
    // 출석 기록에서도 제거
    const updates = [];
    const na = {};
    for(const d in att){
      na[d] = {};
      for(const s in att[d]){
        const ids = att[d][s];
        if(ids.includes(id)){
          const nids = ids.filter(x=>x!==id);
          na[d][s] = nids;
          updates.push({date:d, service:s, member_ids:nids, updated_at:new Date().toISOString()});
        }else na[d][s] = ids;
      }
    }
    setAtt(na);
    if(updates.length){
      const {error:e2} = await sb.from("church_attendance").upsert(updates);
      if(e2){ fail(e2); loadAll(); }
    }
  };
  const saveAtt = async (date, service, ids) => {
    setAtt(a=>({...a, [date]:{...(a[date]||{}), [service]:ids}}));
    const {error} = await sb.from("church_attendance")
      .upsert({date, service, member_ids:ids, updated_at:new Date().toISOString()});
    if(error){ fail(error); loadAll(); }
  };
  const renameChurch = async () => {
    const n = prompt("교회 이름을 입력하세요", churchName);
    if(!n || !n.trim()) return;
    setChurchName(n.trim());
    const {error} = await sb.from("church_settings").upsert({key:"churchName", value:n.trim()});
    if(error) fail(error);
  };

  /* ── 백업 ── */
  const doExport = () => {
    const blob = new Blob([JSON.stringify({version:1, exportedAt:new Date().toISOString(), churchName, members, att}, null, 2)],
      {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `교인관리_백업_${todayStr()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
  };
  const [pendingImport, setPendingImport] = useState(null);
  const doImport = (file) => {
    const r = new FileReader();
    r.onload = () => {
      try{
        const d = JSON.parse(r.result);
        if(!d || !Array.isArray(d.members)) throw new Error("형식 오류");
        setPendingImport(d);
      }catch(e){ alert("백업 파일을 읽지 못했습니다. 이 프로그램에서 내보낸 JSON 파일인지 확인해 주세요."); }
    };
    r.readAsText(file);
  };
  const runImport = async (mode) => {
    const d = pendingImport;
    setPendingImport(null);
    setErr("");
    let e;
    if(mode === "replace"){
      ({error:e} = await sb.from("church_members").delete().neq("id","")); if(e) return fail(e);
      ({error:e} = await sb.from("church_attendance").delete().neq("date","")); if(e) return fail(e);
    }
    const rows = (d.members||[]).map(m=>({id:m.id||uid(), data:m, updated_at:new Date().toISOString(), updated_by:profile.id}));
    for(let i=0;i<rows.length;i+=100){
      ({error:e} = await sb.from("church_members").upsert(rows.slice(i,i+100))); if(e) return fail(e);
    }
    const attIn = d.att||{};
    const arows = [];
    for(const dt in attIn) for(const s in attIn[dt]){
      let ids = attIn[dt][s]||[];
      if(mode === "merge"){
        const cur = (att[dt] && att[dt][s]) || [];
        ids = Array.from(new Set([...cur, ...ids]));
      }
      if(ids.length) arows.push({date:dt, service:s, member_ids:ids, updated_at:new Date().toISOString()});
    }
    for(let i=0;i<arows.length;i+=100){
      ({error:e} = await sb.from("church_attendance").upsert(arows.slice(i,i+100))); if(e) return fail(e);
    }
    if(d.churchName && (mode === "replace" || !churchName || churchName === "우리교회")){
      await sb.from("church_settings").upsert({key:"churchName", value:d.churchName});
    }
    await loadAll();
    alert(mode === "merge" ? "명단을 합쳐 넣었습니다." : "가져오기(전체 교체)가 완료되었습니다.");
  };

  const byId = id => members.find(m => m.id === id);
  const go = v => { setView(v); if(v==="members") setMemView({mode:"list"}); window.scrollTo(0,0); };
  const openMember = id => { setView("members"); setMemView({mode:"detail", id}); window.scrollTo(0,0); };

  const navItems = [["home","대문"],["members","교인"],["att","출석"],["visit","심방"],["pray","중보기도"]];
  if(isAdmin) navItems.push(["team","사용자"]);

  return (
    <div>
      {pendingImport && (
        <div className="modal-back" onClick={()=>setPendingImport(null)}>
          <div className="panel" onClick={e=>e.stopPropagation()}>
            <h2>명단 가져오기</h2>
            <p className="small">파일에 교인 <b>{pendingImport.members.length}명</b>의 기록이 있습니다. 어떻게 넣을까요?</p>
            <button className="btn" style={{width:"100%",marginBottom:8}} onClick={()=>runImport("merge")}>
              추가하기 — 기존 기록은 그대로 두고 합침 (권장)</button>
            <button className="btn danger" style={{width:"100%",marginBottom:8}} onClick={()=>runImport("replace")}>
              전체 교체 — 기존 교인·출석 기록을 지우고 이 파일로 바꿈</button>
            <button className="btn ghost" style={{width:"100%"}} onClick={()=>setPendingImport(null)}>취소</button>
            <p className="muted small" style={{marginTop:10,marginBottom:0}}>
              추가하기를 누르면 새 교인은 추가되고, 같은 교인(같은 고유번호)은 파일 내용으로 갱신됩니다. 모든 사용자에게 함께 적용됩니다.</p>
          </div>
        </div>
      )}
      <header className="top">
        <div className="top-in">
          <div className="brand">
            <Logo/>
            <button onClick={isAdmin ? renameChurch : undefined} title={isAdmin?"교회 이름 바꾸기":""}>{churchName} 교인 관리</button>
          </div>
          <nav>
            {navItems.map(([k,l])=>(
              <button key={k} className={view===k?"on":""} onClick={()=>go(k)}>{l}</button>
            ))}
          </nav>
          <div className="row" style={{gap:6}}>
            <button className="backup-btn" onClick={loadAll} title="다른 사람이 입력한 내용 반영">새로고침</button>
            {canEdit && <button className="backup-btn" onClick={doExport}>백업</button>}
            {isAdmin && <button className="backup-btn" onClick={()=>fileRef.current.click()}>가져오기</button>}
            <button className="backup-btn" onClick={logout}>{profile.name || "나"} · 로그아웃</button>
            <input ref={fileRef} type="file" accept=".json,application/json" style={{display:"none"}}
              onChange={e=>{ if(e.target.files[0]) doImport(e.target.files[0]); e.target.value=""; }}/>
          </div>
        </div>
      </header>

      <div className="wrap">
        {err && <div className="err-banner">{err} <button className="btn sm ghost" onClick={loadAll}>다시 불러오기</button></div>}
        {!loaded ? <div className="panel empty">기록을 불러오는 중…</div> : <React.Fragment>
        {view==="home" && <Home churchName={churchName} members={members} att={att} go={go} openMember={openMember}/>}
        {view==="members" && (
          memView.mode==="list" ? <MemberList members={members} setMemView={setMemView} canEdit={canEdit}/> :
          memView.mode==="form" ? <MemberForm init={memView.id ? byId(memView.id) : null}
              onCancel={()=>setMemView(memView.id ? {mode:"detail", id:memView.id} : {mode:"list"})}
              onSave={(m)=>{ saveMemberRow(m); setMemView({mode:"detail", id:m.id}); }}/> :
          <MemberDetail m={byId(memView.id)} att={att} setMemView={setMemView} canEdit={canEdit}
            update={fn=>updateMember(memView.id, fn)}
            remove={()=>{
              const m = byId(memView.id);
              if(confirm(`'${m.name}' 님의 모든 기록(가족·심방·기도 포함)을 삭제할까요?\n모든 사용자에게 함께 적용되며, 되돌릴 수 없습니다.`)){
                removeMember(memView.id);
                setMemView({mode:"list"});
              }
            }}/>
        )}
        {view==="att" && <Attendance members={members} att={att} saveAtt={saveAtt} canEdit={canEdit}/>}
        {view==="visit" && <Visits members={members} update={updateMember} openMember={openMember} canEdit={canEdit}/>}
        {view==="pray" && <Prayers members={members} update={updateMember} openMember={openMember} canEdit={canEdit}/>}
        {view==="team" && isAdmin && <Team sb={sb} me={profile}/>}
        </React.Fragment>}
      </div>
    </div>
  );
}

/* ───────── 사용자(승인) 관리 ───────── */
function Team({sb, me}){
  const [rows, setRows] = useState(null);
  const [err, setErr] = useState("");

  const load = useCallback(async ()=>{
    const {data, error} = await sb.from("profiles").select("*").order("created_at");
    if(error) setErr(errMsg(error)); else { setRows(data||[]); setErr(""); }
  }, [sb]);
  useEffect(()=>{ load(); }, [load]);

  const setRole = async (id, role) => {
    const {error} = await sb.from("profiles").update({role}).eq("id", id);
    if(error) setErr(errMsg(error)); else load();
  };

  const pending = (rows||[]).filter(r=>r.role==="pending");
  const active = (rows||[]).filter(r=>r.role!=="pending");

  return (
    <div>
      <div className="panel">
        <h2>승인 대기 <span className="muted small">{pending.length}명</span></h2>
        <p className="small muted">가입 신청한 사람 중 <b>믿을 수 있는 분만 승인</b>해 주세요. <b>열람 허용</b>은 보기만, <b>수정 허용</b>은 등록·수정까지 가능합니다.</p>
        {err && <div className="err-banner">{err}</div>}
        {rows===null ? <p className="empty">불러오는 중…</p> :
         pending.length===0 ? <p className="empty">승인을 기다리는 사람이 없습니다.</p> :
          <div className="tbl-wrap"><table>
            <thead><tr><th>이름</th><th>이메일</th><th>신청일</th><th></th></tr></thead>
            <tbody>{pending.map(r=>(
              <tr key={r.id}>
                <td>{r.name || <span className="muted">이름 없음</span>}</td>
                <td>{r.email}</td>
                <td>{(r.created_at||"").slice(0,10)}</td>
                <td style={{whiteSpace:"nowrap"}}>
                  <button className="btn sm ghost" onClick={()=>setRole(r.id,"viewer")}>열람 허용</button>{" "}
                  <button className="btn sm gold" onClick={()=>setRole(r.id,"editor")}>수정 허용</button>
                </td>
              </tr>))}
            </tbody></table></div>}
      </div>

      <div className="panel">
        <h2>사용 중인 구성원 <span className="muted small">{active.length}명</span></h2>
        {rows!==null &&
          <div className="tbl-wrap"><table>
            <thead><tr><th>이름</th><th>이메일</th><th>권한</th><th></th></tr></thead>
            <tbody>{active.map(r=>(
              <tr key={r.id}>
                <td>{r.name || <span className="muted">이름 없음</span>}{r.id===me.id && " (나)"}</td>
                <td>{r.email}</td>
                <td><span className={"chip "+r.role}>{ROLE_LABEL[r.role]||r.role}</span></td>
                <td style={{whiteSpace:"nowrap"}}>
                  {r.id!==me.id && <React.Fragment>
                    {r.role!=="viewer" &&
                      <button className="btn sm ghost" onClick={()=>setRole(r.id,"viewer")}>열람만</button>}{" "}
                    {r.role!=="editor" &&
                      <button className="btn sm ghost" onClick={()=>setRole(r.id,"editor")}>수정 가능</button>}{" "}
                    {r.role!=="admin" &&
                      <button className="btn sm ghost" onClick={()=>{
                        if(confirm(`${r.name||r.email} 님을 관리자로 지정할까요? 관리자는 사용자 승인 권한도 갖게 됩니다.`)) setRole(r.id,"admin");
                      }}>관리자로</button>}{" "}
                    <button className="btn sm danger" onClick={()=>{
                      if(confirm(`${r.name||r.email} 님의 접근 권한을 해제할까요? 다시 승인하기 전까지 교인 기록을 볼 수 없게 됩니다.`)) setRole(r.id,"pending");
                    }}>권한 해제</button>
                  </React.Fragment>}
                  {r.id===me.id && <span className="muted small">본인 권한은 바꿀 수 없습니다</span>}
                </td>
              </tr>))}
            </tbody></table></div>}
      </div>
    </div>
  );
}

/* ───────── 대문 ───────── */
function Home({churchName, members, att, go, openMember}){
  const thisMonth = new Date().getMonth()+1;
  const birthdays = members
    .filter(m => m.birth && Number(m.birth.split("-")[1]) === thisMonth)
    .sort((a,b)=> a.birth.slice(5).localeCompare(b.birth.slice(5)));

  const lastSunday = useMemo(()=>{
    const dates = Object.keys(att).filter(d => (att[d].sun||[]).length).sort();
    return dates.length ? dates[dates.length-1] : null;
  }, [att]);
  const sunCount = lastSunday ? att[lastSunday].sun.length : 0;

  const openPray = members.reduce((n,m)=> n + (m.prayers||[]).filter(p=>p.status==="open").length, 0);
  const monthPrefix = `${new Date().getFullYear()}-${pad(thisMonth)}`;
  const visitsThisMonth = members.reduce((n,m)=> n + (m.visits||[]).filter(v=>(v.when||"").startsWith(monthPrefix)).length, 0);

  return (

        <div className="notice">아직 등록된 교인이 없습니다. 상단의 <b>교인</b> 메뉴에서 첫 교인을 등록해 보세요.</div>}
    </div>
  );
}

/* ───────── 교인 목록 ───────── */
function MemberCard({m, onClick}){
  const age = calcAge(m.birth);
  const cur = (m.depts||[]).filter(d=>d.current).map(d=>d.name).join(", ");
  return (
    <button className="mem-card" onClick={onClick}>
      <div className="row" style={{justifyContent:"space-between"}}>
        <span className="nm">{m.name}</span>
        <span className="chip pos">{m.position||"성도"}</span>
      </div>
      <div className="sub">{age!==null ? `${age}세 · ` : ""}{m.phone || "연락처 없음"}</div>
      {cur && <div className="sub">봉사: {cur}</div>}
    </button>
  );
}

function MemberList({members, setMemView, canEdit}){
  const [book, setBook] = useState("all"); // all=교인 명부 | sok=속별 명부
  const [q, setQ] = useState("");
  const [pos, setPos] = useState("전체");
  const [mode, setMode] = useState("pos"); // pos=직분별 | name=가나다순
  const positions = ["전체", ...Array.from(new Set(members.map(m=>m.position).filter(Boolean)))
    .sort((a,b)=>{
      const ia = POSITIONS.indexOf(a), ib = POSITIONS.indexOf(b);
      if(ia!==-1 && ib!==-1) return ia-ib;
      if(ia!==-1) return -1; if(ib!==-1) return 1;
      return a.localeCompare(b,"ko");
    })];
  const list = members
    .filter(m => book!=="all" || pos==="전체" || m.position===pos)
    .filter(m => !q || (m.name+m.phone+m.address).includes(q))
    .sort(koSort);

  const groups = useMemo(()=>{
    const map = {};
    list.forEach(m=>{ const p = m.position || "성도"; (map[p]=map[p]||[]).push(m); });
    const known = POSITIONS.filter(p=>map[p]);
    const extra = Object.keys(map).filter(p=>!POSITIONS.includes(p)).sort((a,b)=>a.localeCompare(b,"ko"));
    return [...known, ...extra].map(p=>({pos:p, items:map[p]}));
  }, [list]);

  const sokGroups = useMemo(()=>{
    const map = {};
    list.forEach(m=>{
      const s = sokOf(m);
      const key = s ? s.g + s.n : "zz";
      if(!map[key]) map[key] = {s:s, items:[]};
      map[key].items.push(m);
    });
    const order = ["남1","남2","남3","여1","여2","여3","여4","여5","여6","여7","zz"];
    return order.filter(k=>map[k]).map(k=>({
      key:k,
      label: k==="zz" ? "속 미지정" : sokLabel(map[k].s),
      items: map[k].items
    }));
  }, [list]);

  const SCHOOL = [
    {key:"kinder", label:"유치부 (5~7세)", min:5, max:7},
    {key:"child", label:"아동부 (8~13세)", min:8, max:13},
    {key:"youth", label:"중고등부 (14~19세)", min:14, max:19},
    {key:"young", label:"청년부 (20~29세)", min:20, max:29},
  ];
  const schoolGroups = useMemo(()=>{
    return SCHOOL.map(s=>({
      key:s.key, label:s.label,
      items: list.filter(m=>{
        const a = calcAge(m.birth);
        return a!==null && a>=s.min && a<=s.max;
      })
    }));
  }, [list]);

  const gTitle = {margin:"0 0 8px", fontSize:"17px", color:"var(--pine-deep)",
    borderBottom:"2px solid var(--gold)", display:"inline-block", paddingBottom:"2px"};

  return (
    <div>
      <div className="panel">
        <div className="row" style={{justifyContent:"space-between"}}>
          <h2 style={{margin:0}}>교인 <span className="muted small">{members.length}명</span></h2>
          {canEdit && <button className="btn gold" onClick={()=>setMemView({mode:"form"})}>+ 새 교인 등록</button>}
        </div>
        <div className="svc-tabs" style={{marginTop:14, marginBottom:0}}>
          <button className={book==="all"?"on":""} onClick={()=>setBook("all")}>교인 명부</button>
          <button className={book==="sok"?"on":""} onClick={()=>setBook("sok")}>속별 명부</button>
          <button className={book==="school"?"on":""} onClick={()=>setBook("school")}>교회학교</button>
        </div>
        <div className="row" style={{marginTop:12}}>
          <input placeholder="이름·연락처·주소 검색" value={q} onChange={e=>setQ(e.target.value)} style={{flex:"1 1 200px"}}/>
          {book==="all" && <select value={pos} onChange={e=>setPos(e.target.value)}>
            {positions.map(p=><option key={p}>{p}</option>)}
          </select>}
          {book==="all" && <div className="svc-tabs" style={{margin:0}}>
            <button className={mode==="pos"?"on":""} onClick={()=>setMode("pos")}>직분별</button>
            <button className={mode==="name"?"on":""} onClick={()=>setMode("name")}>가나다순</button>
          </div>}
        </div>
      </div>

      {list.length===0 ? <div className="panel empty">조건에 맞는 교인이 없습니다.</div> :
       book==="school" ?
        <div>
          {schoolGroups.every(g=>g.items.length===0) ?
            <div className="panel empty">교회학교(5~29세)에 해당하는 교인이 없습니다.<br/>
              자녀·학생도 '새 교인 등록'에서 생년월일과 함께 등록하면 나이에 따라 자동으로 분류됩니다.</div> :
            schoolGroups.map(g=>(
              <div key={g.key} style={{marginBottom:18}}>
                <h3 style={gTitle}>{g.label} <span className="muted small">{g.items.length}명</span></h3>
                {g.items.length===0 ?
                  <p className="muted small" style={{margin:"0 0 8px"}}>해당 교인이 없습니다.</p> :
                  <div className="mem-list">
                    {g.items.map(m=>(
                      <MemberCard key={m.id} m={m} onClick={()=>setMemView({mode:"detail", id:m.id})}/>
                    ))}
                  </div>}
              </div>
            ))}
        </div>
       : book==="sok" ?
        <div>
          {sokGroups.map(g=>(
            <div key={g.key} style={{marginBottom:18}}>
              <h3 style={gTitle}>{g.label} <span className="muted small">{g.items.length}명</span></h3>
              {g.key==="zz" && <p className="muted small" style={{margin:"0 0 8px"}}>
                성별·생년월일이 없어 속을 정하지 못했습니다. '정보 수정'에서 성별과 생년월일을 넣으면 자동 배정됩니다.</p>}
              <div className="mem-list">
                {g.items.map(m=>(
                  <MemberCard key={m.id} m={m} onClick={()=>setMemView({mode:"detail", id:m.id})}/>
                ))}
              </div>
            </div>
          ))}
        </div>
       : mode==="name" ?
        <div className="mem-list">
          {list.map(m=>(
            <MemberCard key={m.id} m={m} onClick={()=>setMemView({mode:"detail", id:m.id})}/>
          ))}
        </div>
       :
        <div>
          {groups.map(g=>(
            <div key={g.pos} style={{marginBottom:18}}>
              <h3 style={gTitle}>{g.pos} <span className="muted small">{g.items.length}명</span></h3>
              <div className="mem-list">
                {g.items.map(m=>(
                  <MemberCard key={m.id} m={m} onClick={()=>setMemView({mode:"detail", id:m.id})}/>
                ))}
              </div>
            </div>
          ))}
        </div>}
    </div>
  );
}

/* ───────── 교인 등록/수정 ───────── */
function MemberForm({init, onSave, onCancel}){
  const [m, setM] = useState(init ? JSON.parse(JSON.stringify(init)) : emptyMember());
  const set = (k,v)=>setM(o=>({...o,[k]:v}));
  const setArr = (k, i, f, v)=>setM(o=>{ const a=[...o[k]]; a[i]={...a[i],[f]:v}; return {...o,[k]:a}; });
  const addRow = (k, row)=>setM(o=>({...o,[k]:[...o[k], row]}));
  const delRow = (k, i)=>setM(o=>({...o,[k]:o[k].filter((_,j)=>j!==i)}));

  return (
    <div className="panel">
      <h2>{init ? "교인 정보 수정" : "새 교인 등록"}</h2>

      <div className="form-grid">
        <div className="field"><label>이름 *</label>
          <input value={m.name} onChange={e=>set("name",e.target.value)} placeholder="홍길동"/></div>
        <div className="field"><label>생년월일</label>
          <input type="date" value={m.birth} onChange={e=>set("birth",e.target.value)}/></div>
        <div className="field"><label>성별 <span className="muted small">(속 자동 배정에 사용)</span></label>
          <select value={m.gender||""} onChange={e=>set("gender",e.target.value)}>
            <option value="">선택 안 함</option>
            <option value="여">여</option>
            <option value="남">남</option>
          </select></div>
        <div className="field"><label>연락처</label>
          <input value={m.phone} onChange={e=>set("phone",e.target.value)} placeholder="010-0000-0000"/></div>
        <div className="field"><label>직분</label>
          <input list="pos-list" value={m.position} onChange={e=>set("position",e.target.value)}/>
          <datalist id="pos-list">{POSITIONS.map(p=><option key={p} value={p}/>)}</datalist></div>
      </div>
      <div className="field"><label>주소</label>
        <input value={m.address} onChange={e=>set("address",e.target.value)} placeholder="시/구/동 상세주소"/></div>
      <div className="field"><label>메모</label>
        <textarea rows="2" value={m.memo} onChange={e=>set("memo",e.target.value)} placeholder="특이사항, 신앙 배경 등"/></div>

      <h3>가족</h3>
      {m.family.length===0 && <p className="muted small">등록된 가족이 없습니다.</p>}
      {m.family.map((f,i)=>(
        <div className="row" key={f.id} style={{marginBottom:8}}>
          <select value={f.relation} onChange={e=>setArr("family",i,"relation",e.target.value)} style={{width:95}}>
            {RELATIONS.map(r=><option key={r}>{r}</option>)}
          </select>
          <input placeholder="이름" value={f.name} onChange={e=>setArr("family",i,"name",e.target.value)} style={{width:110}}/>
          <input placeholder="나이" type="number" min="0" value={f.age} onChange={e=>setArr("family",i,"age",e.target.value)} style={{width:75}}/>
          <input placeholder="직업 / 학교" value={f.job} onChange={e=>setArr("family",i,"job",e.target.value)} style={{flex:"1 1 140px"}}/>
          <button className="btn sm danger" onClick={()=>delRow("family",i)}>삭제</button>
        </div>
      ))}
      <button className="btn sm ghost" onClick={()=>addRow("family",{id:uid(),relation:"배우자",name:"",age:"",job:""})}>+ 가족 추가</button>

      <h3>봉사 부서 <span className="muted small">(과거 이력도 함께 기록)</span></h3>
      {m.depts.length===0 && <p className="muted small">등록된 봉사 부서가 없습니다.</p>}
      {m.depts.map((d,i)=>(
        <div className="row" key={d.id} style={{marginBottom:8}}>
          <input placeholder="부서명 (예: 찬양대)" value={d.name} onChange={e=>setArr("depts",i,"name",e.target.value)} style={{flex:"1 1 140px"}}/>
          <input placeholder="시작 (예: 2020)" value={d.from} onChange={e=>setArr("depts",i,"from",e.target.value)} style={{width:110}}/>
          <input placeholder="종료" value={d.to} disabled={d.current} onChange={e=>setArr("depts",i,"to",e.target.value)} style={{width:110}}/>
          <label className="row small" style={{gap:5}}>
            <input type="checkbox" checked={!!d.current}
              onChange={e=>{ setArr("depts",i,"current",e.target.checked); if(e.target.checked) setArr("depts",i,"to",""); }}/>
            현재 봉사 중
          </label>
          <button className="btn sm danger" onClick={()=>delRow("depts",i)}>삭제</button>
        </div>
      ))}
      <button className="btn sm ghost" onClick={()=>addRow("depts",{id:uid(),name:"",from:"",to:"",current:true})}>+ 부서 추가</button>

      <hr className="divider"/>
      <div className="row">
        <button className="btn" disabled={!m.name.trim()} onClick={()=>onSave({...m, name:m.name.trim()})}>저장</button>
        <button className="btn ghost" onClick={onCancel}>취소</button>
        {!m.name.trim() && <span className="muted small">이름을 입력하면 저장할 수 있습니다.</span>}
      </div>
    </div>
  );
}

/* ───────── 교인 상세 ───────── */
function MemberDetail({m, att, setMemView, update, remove, canEdit}){
  const [vWhen, setVWhen] = useState(nowLocal());
  const [vPurpose, setVPurpose] = useState("정기심방");
  const [vNote, setVNote] = useState("");
  const [pReq, setPReq] = useState("");

  if(!m) return <div className="panel empty">교인 정보를 찾을 수 없습니다.</div>;
  const age = calcAge(m.birth);
  const year = String(new Date().getFullYear());

  const attStat = SERVICES.map(s=>{
    const dates = Object.keys(att).filter(d => (att[d][s.key]||[]).includes(m.id)).sort();
    return {label:s.label, total:dates.length,
      year:dates.filter(d=>d.startsWith(year)).length,
      last:dates.length ? dates[dates.length-1] : null};
  });

  const curDepts = (m.depts||[]).filter(d=>d.current);
  const pastDepts = (m.depts||[]).filter(d=>!d.current);

  return (
    <div>
      <div className="back-line">
        <button className="btn sm ghost" onClick={()=>setMemView({mode:"list"})}>← 명부로</button>
      </div>

      <div className="panel">
        <div className="row" style={{justifyContent:"space-between"}}>
          <h2 style={{margin:0}}>{m.name} <span className="chip pos">{m.position||"성도"}</span></h2>
          {canEdit && <div className="row" style={{gap:6}}>
            <button className="btn sm" onClick={()=>setMemView({mode:"form", id:m.id})}>정보 수정</button>
            <button className="btn sm danger" onClick={remove}>삭제</button>
          </div>}
        </div>
        <div className="tbl-wrap" style={{marginTop:12}}><table>
          <tbody>
            <tr><th style={{width:90}}>생년월일</th><td>{m.birth ? `${m.birth} (${age}세)` : <span className="muted">미입력</span>}</td></tr>
            <tr><th>속회</th><td>{sokOf(m) ? sokLabel(sokOf(m)) : <span className="muted">미지정 — 성별과 생년월일을 입력하면 자동 배정됩니다</span>}{m.gender && <span className="muted small"> · 성별: {m.gender}</span>}</td></tr>
            <tr><th>연락처</th><td>{m.phone ? <a href={"tel:"+m.phone.replace(/[^0-9+]/g,"")}>{m.phone}</a> : <span className="muted">미입력</span>}</td></tr>
            <tr><th>주소</th><td>{m.address || <span className="muted">미입력</span>}</td></tr>
            {m.memo && <tr><th>메모</th><td style={{whiteSpace:"pre-wrap"}}>{m.memo}</td></tr>}
          </tbody></table></div>
      </div>

      <div className="panel">
        <h2>가족</h2>
        {(m.family||[]).length===0 ? <p className="empty">등록된 가족이 없습니다. '정보 수정'에서 추가할 수 있습니다.</p> :
          <div className="tbl-wrap"><table>
            <thead><tr><th>관계</th><th>이름</th><th>나이</th><th>직업 / 학교</th></tr></thead>
            <tbody>{m.family.map(f=>(
              <tr key={f.id}><td>{f.relation}</td><td>{f.name}</td><td>{f.age && `${f.age}세`}</td><td>{f.job}</td></tr>))}
            </tbody></table></div>}
      </div>

      <div className="panel">
        <h2>봉사 부서</h2>
        {(m.depts||[]).length===0 ? <p className="empty">등록된 봉사 이력이 없습니다.</p> : (
          <div>
            {curDepts.length>0 && <div style={{marginBottom:8}}>
              {curDepts.map(d=><span key={d.id} className="chip now" style={{marginRight:6}}>
                {d.name}{d.from && ` (${d.from}~현재)`}</span>)}
            </div>}
            {pastDepts.length>0 && <div>
              {pastDepts.map(d=><span key={d.id} className="chip past" style={{marginRight:6}}>
                {d.name}{(d.from||d.to) && ` (${d.from||"?"}~${d.to||"?"})`}</span>)}
            </div>}
          </div>)}

      <div className="panel">
        <h2>예배 출석 현황</h2>

            <tr key={s.label}><td>{s.label}</td>

              </tr>))}
            </tbody></table></div>}
        {canEdit && <React.Fragment>
        <h3>새 심방 기록</h3>
        <div className="row">
          <input type="datetime-local" value={vWhen} onChange={e=>setVWhen(e.target.value)}/>
          <select value={vPurpose} onChange={e=>setVPurpose(e.target.value)}>
            {PURPOSES.map(p=><option key={p}>{p}</option>)}
          </select>
        </div>
        <div className="row" style={{marginTop:8}}>

              <tr key={p.id}>
                <td style={{whiteSpace:"nowrap"}}>{p.date}</td>

                </td>
                <td style={{whiteSpace:"nowrap"}}>
                  {canEdit && <React.Fragment>
                  <button className="btn sm ghost" onClick={()=>update(o=>({...o, prayers:o.prayers.map(x=>
                    x.id===p.id ? (x.status==="answered" ? {...x,status:"open",answeredDate:""} : {...x,status:"answered",answeredDate:todayStr()}) : x)}))}>
                    {p.status==="answered" ? "요청중으로" : "응답 체크"}
                  </button>{" "}
                  <button className="btn sm danger" onClick={()=>{
                    if(confirm("이 기도 제목을 삭제할까요?")) update(o=>({...o, prayers:o.prayers.filter(x=>x.id!==p.id)}));
                  }}>삭제</button>
                  </React.Fragment>}
                </td>
              </tr>))}
            </tbody></table></div>}
        {canEdit && <React.Fragment>
        <h3>새 기도 제목</h3>
        <div className="row">
          <input placeholder="기도 요청 사항" value={pReq} onChange={e=>setPReq(e.target.value)} style={{flex:"1 1 240px"}}/>
          <button className="btn" disabled={!pReq.trim()} onClick={()=>{
            update(o=>({...o, prayers:[...(o.prayers||[]), {id:uid(), date:todayStr(), request:pReq.trim(), status:"open", answeredDate:""}]}));
            setPReq("");
          }}>추가</button>
        </div>
        </React.Fragment>}
      </div>
    </div>
  );
}

/* ───────── 출석 체크 ───────── */
function Attendance({members, att, saveAtt, canEdit}){
  const [svc, setSvc] = useState("sun");
  const svcObj = SERVICES.find(s=>s.key===svc);
  const [date, setDate] = useState(()=> lastWeekday(0));
  const [q, setQ] = useState("");

  useEffect(()=>{ if(svcObj.dow!==null) setDate(lastWeekday(svcObj.dow)); }, [svc]);

  const checked = (att[date] && att[date][svc]) || [];
  const toggle = id => {
    if(!canEdit) return;
    const ids = checked.includes(id) ? checked.filter(x=>x!==id) : [...checked, id];
    saveAtt(date, svc, ids);
  };
  const clearAll = () => {
    if(checked.length && confirm(`${date} ${svcObj.label} 출석 체크를 모두 해제할까요?`))
      saveAtt(date, svc, []);
  };

  const list = members.filter(m=>!q || m.name.includes(q)).sort(koSort);
  const recent = Object.keys(att).filter(d=>(att[d][svc]||[]).length).sort().reverse().slice(0,8);

  return (
    <div>
      <div className="panel">
        <h2>출석 체크</h2>
        <div className="svc-tabs">
          {SERVICES.map(s=>(
            <button key={s.key} className={svc===s.key?"on":""} onClick={()=>setSvc(s.key)}>{s.label}</button>
          ))}
        </div>
        <div className="row">
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          <span className="muted">{date && `${weekdayOf(date)}요일`}</span>
          <span className="count-badge" style={{marginLeft:"auto"}}>{checked.length}</span>
          <span className="muted small">/ {members.length}명 출석</span>
          {canEdit && <button className="btn sm danger" onClick={clearAll} disabled={!checked.length}>모두 해제</button>}
        </div>
        <div className="row" style={{marginTop:10}}>
          <input placeholder="이름 검색" value={q} onChange={e=>setQ(e.target.value)} style={{flex:"1 1 160px",maxWidth:260}}/>
        </div>

        {members.length===0 ? <p className="empty">먼저 교인을 등록해 주세요.</p> :
          <div className="att-list">
            {list.map(m=>{
              const on = checked.includes(m.id);
              return (
                <button key={m.id} className={"att-item"+(on?" on":"")} onClick={()=>toggle(m.id)}
                  aria-pressed={on}>
                  <span className="mark">{on?"✓":""}</span>
                  <span>{m.name} <span className="muted small">{m.position}</span></span>
                </button>);
            })}
          </div>}
        <p className="muted small" style={{marginTop:14,marginBottom:0}}>{canEdit ? "이름을 누르면 출석/해제가 되고, 체크 즉시 서버에 저장됩니다." : "열람 권한으로 접속 중입니다. 출석 체크는 수정 권한이 있는 분만 할 수 있습니다."}</p>
      </div>

      <div className="panel">
        <h2>{svcObj.label} 최근 기록</h2>
        {recent.length===0 ? <p className="empty">아직 기록이 없습니다.</p> :
          <div className="tbl-wrap"><table>
            <thead><tr><th>날짜</th><th>출석 인원</th><th>출석자</th><th></th></tr></thead>
            <tbody>{recent.map(d=>{
              const ids = att[d][svc];
              const names = ids.map(id=>{const m=members.find(x=>x.id===id); return m?m.name:null;}).filter(Boolean);
              return (
                <tr key={d}>
                  <td style={{whiteSpace:"nowrap"}}>{d} ({weekdayOf(d)})</td>
                  <td><b style={{color:"var(--pine)"}}>{names.length}</b>명</td>
                  <td>{names.join(", ")}</td>
                  <td><button className="btn sm ghost" onClick={()=>setDate(d)}>열기</button></td>
                </tr>);
            })}</tbody></table></div>}
      </div>
    </div>
  );
}

/* ───────── 심방 전체 ───────── */
function Visits({members, update, openMember, canEdit}){
  const [memId, setMemId] = useState("");
  const [when, setWhen] = useState(nowLocal());
  const [purpose, setPurpose] = useState("정기심방");
  const [note, setNote] = useState("");

  const all = members.flatMap(m => (m.visits||[]).map(v=>({...v, memId:m.id, memName:m.name})))
    .sort((a,b)=>(b.when||"").localeCompare(a.when||""));

  return (
    <div>
      {canEdit && <div className="panel">
        <h2>새 심방 기록</h2>
        {members.length===0 ? <p className="empty">먼저 교인을 등록해 주세요.</p> :
        <div>
          <div className="row">
            <select value={memId} onChange={e=>setMemId(e.target.value)} style={{minWidth:140}}>
              <option value="">교인 선택…</option>
              {[...members].sort(koSort).map(m=><option key={m.id} value={m.id}>{m.name} ({m.position})</option>)}
            </select>
            <input type="datetime-local" value={when} onChange={e=>setWhen(e.target.value)}/>
            <select value={purpose} onChange={e=>setPurpose(e.target.value)}>
              {PURPOSES.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div className="row" style={{marginTop:8}}>
            <input placeholder="내용 (선택)" value={note} onChange={e=>setNote(e.target.value)} style={{flex:"1 1 220px"}}/>
            <button className="btn" disabled={!memId || !when} onClick={()=>{
              update(memId, o=>({...o, visits:[...(o.visits||[]), {id:uid(), when, purpose, note:note.trim()}]}));
              setNote(""); setWhen(nowLocal());
            }}>기록 추가</button>
          </div>
        </div>}
      </div>}

      <div className="panel">
        <h2>심방 기록 전체 <span className="muted small">{all.length}건</span></h2>
        {all.length===0 ? <p className="empty">아직 심방 기록이 없습니다.</p> :
          <div className="tbl-wrap"><table>
            <thead><tr><th>일시</th><th>교인</th><th>목적</th><th>내용</th><th></th></tr></thead>
            <tbody>{all.map(v=>(
              <tr key={v.id}>
                <td style={{whiteSpace:"nowrap"}}>{fmtDT(v.when)}</td>
                <td><button className="btn sm ghost" onClick={()=>openMember(v.memId)}>{v.memName}</button></td>
                <td><span className="chip pos">{v.purpose}</span></td>
                <td style={{whiteSpace:"pre-wrap"}}>{v.note}</td>
                <td>{canEdit && <button className="btn sm danger" onClick={()=>{
                  if(confirm("이 심방 기록을 삭제할까요?"))
                    update(v.memId, o=>({...o, visits:o.visits.filter(x=>x.id!==v.id)}));
                }}>삭제</button>}</td>
              </tr>))}
            </tbody></table></div>}
      </div>
    </div>
  );
}

/* ───────── 중보기도 전체 ───────── */
function Prayers({members, update, openMember, canEdit}){
  const [filter, setFilter] = useState("open");
  const [memId, setMemId] = useState("");
  const [req, setReq] = useState("");

  const all = members.flatMap(m => (m.prayers||[]).map(p=>({...p, memId:m.id, memName:m.name})))
    .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const list = all.filter(p => filter==="all" || p.status===filter);
  const openN = all.filter(p=>p.status==="open").length;

  return (
    <div>
      {canEdit && <div className="panel">
        <h2>새 기도 요청</h2>
        {members.length===0 ? <p className="empty">먼저 교인을 등록해 주세요.</p> :
        <div className="row">
          <select value={memId} onChange={e=>setMemId(e.target.value)} style={{minWidth:140}}>
            <option value="">교인 선택…</option>
            {[...members].sort(koSort).map(m=><option key={m.id} value={m.id}>{m.name} ({m.position})</option>)}
          </select>
          <input placeholder="기도 요청 사항" value={req} onChange={e=>setReq(e.target.value)} style={{flex:"1 1 220px"}}/>
          <button className="btn" disabled={!memId || !req.trim()} onClick={()=>{
            update(memId, o=>({...o, prayers:[...(o.prayers||[]), {id:uid(), date:todayStr(), request:req.trim(), status:"open", answeredDate:""}]}));
            setReq("");
          }}>추가</button>
        </div>}
      </div>}

      <div className="panel">
        <div className="row" style={{justifyContent:"space-between"}}>
          <h2 style={{margin:0}}>중보기도 <span className="muted small">요청중 {openN}건</span></h2>
          <div className="svc-tabs" style={{margin:0}}>
            {[["open","요청중"],["answered","응답"],["all","전체"]].map(([k,l])=>(
              <button key={k} className={filter===k?"on":""} onClick={()=>setFilter(k)}>{l}</button>))}
          </div>
        </div>
        {list.length===0 ? <p className="empty">해당하는 기도 제목이 없습니다.</p> :
          <div className="tbl-wrap" style={{marginTop:12}}><table>
            <thead><tr><th>요청일</th><th>교인</th><th>기도 제목</th><th>상태</th><th></th></tr></thead>
            <tbody>{list.map(p=>(
              <tr key={p.id}>
                <td style={{whiteSpace:"nowrap"}}>{p.date}</td>
                <td><button className="btn sm ghost" onClick={()=>openMember(p.memId)}>{p.memName}</button></td>
                <td style={{whiteSpace:"pre-wrap"}}>{p.request}</td>
                <td style={{whiteSpace:"nowrap"}}>
                  {p.status==="answered"
                    ? <span className="chip ans">응답 {p.answeredDate && `(${p.answeredDate})`}</span>
                    : <span className="chip open">요청중</span>}
                </td>
                <td style={{whiteSpace:"nowrap"}}>
                  {canEdit && <React.Fragment>
                  <button className="btn sm ghost" onClick={()=>update(p.memId, o=>({...o, prayers:o.prayers.map(x=>
                    x.id===p.id ? (x.status==="answered" ? {...x,status:"open",answeredDate:""} : {...x,status:"answered",answeredDate:todayStr()}) : x)}))}>
                    {p.status==="answered" ? "요청중으로" : "응답 체크"}
                  </button>{" "}
                  <button className="btn sm danger" onClick={()=>{
                    if(confirm("이 기도 제목을 삭제할까요?"))
                      update(p.memId, o=>({...o, prayers:o.prayers.filter(x=>x.id!==p.id)}));
                  }}>삭제</button>
                  </React.Fragment>}
                </td>
              </tr>))}
            </tbody></table></div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
